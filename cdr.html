<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDR Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <main id="game">
      <header class="header">
        <p class="room-name" id="room-name">Reception</p>
      </header>

      <section class="scene" id="scene" aria-label="Reception">
        <button class="hotspot" id="hotspot-telefono" type="button" data-scene="reception" data-hotspot-id="telefono" data-label="Telefono" data-action="message" data-message="Hai preso il telefono. Dall'altra parte senti un lungo sbadiglio." aria-label="Telefono">
          <span class="hotspot-label">Telefono</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-camere" type="button" data-scene="reception" data-hotspot-id="camere" data-label="Porta Camere" data-action="change-scene" data-target="camere" aria-label="Vai alle camere">
          <span class="hotspot-label">Porta Camere</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-infermeria" type="button" data-scene="reception" data-hotspot-id="infermeria" data-label="Porta Infermeria" data-action="change-scene" data-target="infermeria" aria-label="Vai in infermeria">
          <span class="hotspot-label">Porta Infermeria</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-sala-ricreativa" type="button" data-scene="reception" data-hotspot-id="sala-ricreativa" data-label="Porta Sala Ricreativa" data-action="change-scene" data-target="sala-ricreativa" aria-label="Vai in sala ricreativa">
          <span class="hotspot-label">Porta Sala Ricreativa</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-sala-mensa" type="button" data-scene="reception" data-hotspot-id="sala-mensa" data-label="Porta Sala Mensa" data-action="change-scene" data-target="sala-mensa" aria-label="Vai in sala mensa">
          <span class="hotspot-label">Porta Sala Mensa</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-back-infermeria" type="button" data-scene="infermeria" data-hotspot-id="back" data-label="Torna alla Reception" data-action="change-scene" data-target="reception" aria-label="Torna alla reception">
          <span class="hotspot-label">Torna alla Reception</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-back-camere" type="button" data-scene="camere" data-hotspot-id="back" data-label="Torna alla Reception" data-action="change-scene" data-target="reception" aria-label="Torna alla reception">
          <span class="hotspot-label">Torna alla Reception</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-back-sala-ricreativa" type="button" data-scene="sala-ricreativa" data-hotspot-id="back" data-label="Torna alla Reception" data-action="change-scene" data-target="reception" aria-label="Torna alla reception">
          <span class="hotspot-label">Torna alla Reception</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot" id="hotspot-back-sala-mensa" type="button" data-scene="sala-mensa" data-hotspot-id="back" data-label="Torna alla Reception" data-action="change-scene" data-target="reception" aria-label="Torna alla reception">
          <span class="hotspot-label">Torna alla Reception</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto1" type="button" data-scene="sala-mensa" data-hotspot-id="posto1" data-label="Posto 1" data-action="message" data-message="Hai selezionato posto 1" aria-label="Posto 1">
          <span class="hotspot-label">Posto 1</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto2" type="button" data-scene="sala-mensa" data-hotspot-id="posto2" data-label="Posto 2" data-action="message" data-message="Hai selezionato posto 2" aria-label="Posto 2">
          <span class="hotspot-label">Posto 2</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto3" type="button" data-scene="sala-mensa" data-hotspot-id="posto3" data-label="Posto 3" data-action="message" data-message="Hai selezionato posto 3" aria-label="Posto 3">
          <span class="hotspot-label">Posto 3</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto4" type="button" data-scene="sala-mensa" data-hotspot-id="posto4" data-label="Posto 4" data-action="message" data-message="Hai selezionato posto 4" aria-label="Posto 4">
          <span class="hotspot-label">Posto 4</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto5" type="button" data-scene="sala-mensa" data-hotspot-id="posto5" data-label="Posto 5" data-action="message" data-message="Hai selezionato posto 5" aria-label="Posto 5">
          <span class="hotspot-label">Posto 5</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <button class="hotspot seat-slot" id="hotspot-posto6" type="button" data-scene="sala-mensa" data-hotspot-id="posto6" data-label="Posto 6" data-action="message" data-message="Hai selezionato posto 6" aria-label="Posto 6">
          <span class="hotspot-label">Posto 6</span>
          <span class="hotspot-meta"></span>
          <span class="hotspot-resize" aria-hidden="true"></span>
        </button>

        <div class="character character-nonnogianni" id="character-nonnogianni" data-scene="sala-mensa" data-character-id="nonnogianni" aria-hidden="true">
          <span class="character-label">Nonno Gianni</span>
          <span class="character-meta"></span>
          <img src="assets/characters/nonnogianni.png" alt="Nonno Gianni">
          <span class="character-resize" aria-hidden="true"></span>
        </div>

        <div class="speech-bubble" id="bubble-nonnogianni" data-scene="sala-mensa" data-bubble-id="nonnogianni" aria-hidden="true">
          <span class="speech-bubble-label">Fumetto Nonno Gianni</span>
          <span class="speech-bubble-meta"></span>
          <p class="speech-bubble-text">...</p>
          <span class="speech-bubble-tail" aria-hidden="true"></span>
          <span class="speech-bubble-resize" aria-hidden="true"></span>
        </div>
      </section>

      <section class="console" aria-live="polite">
        <p class="console-title">Console</p>
        <p class="console-output" id="console-output">Benvenuto alla reception. Clicca un'area per vedere un messaggio.</p>
      </section>
    </main>

    <div id="dev-controls">
      <nav class="scene-nav" aria-label="Navigazione scene">
        <button class="scene-nav-button" type="button" data-nav-target="reception">Reception</button>
        <button class="scene-nav-button" type="button" data-nav-target="infermeria">Infermeria</button>
        <button class="scene-nav-button" type="button" data-nav-target="camere">Camere</button>
        <button class="scene-nav-button" type="button" data-nav-target="sala-ricreativa">Sala Ricreativa</button>
        <button class="scene-nav-button" type="button" data-nav-target="sala-mensa">Sala Mensa</button>
      </nav>

      <div class="dev-toolbar">
        <button class="dev-button" id="toggle-editor" type="button" aria-pressed="false">Editor Hotspot</button>
        <button class="dev-button" id="toggle-preview" type="button" aria-pressed="false">Vista Gioco</button>
        <button class="dev-button" id="copy-layout" type="button">Copia layout</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
